<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Enhancer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-md w-full bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700">
        <h1 class="text-3xl font-bold text-center mb-2 text-blue-400">AI Enhancer</h1>
        <p class="text-gray-400 text-center mb-8 text-sm">Upload a photo to get AI enhancement tips</p>

        <div class="space-y-4">
            <input type="file" id="imageInput" accept="image/*" 
                   class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer">
            
            <button onclick="processPhoto()" id="btn" 
                    class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition-all duration-200 transform hover:scale-105 active:scale-95">
                Enhance Photo
            </button>
        </div>

        <div id="resultBox" class="mt-8 hidden border-t border-gray-700 pt-6">
            <h2 class="text-lg font-semibold text-green-400 mb-2">AI Suggestions:</h2>
            <p id="resultText" class="text-gray-300 text-sm leading-relaxed text-justify"></p>
        </div>

        <div id="loader" class="hidden flex justify-center mt-6">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-10 w-10"></div>
        </div>
    </div>

    <script>
        async function processPhoto() {
            const fileInput = document.getElementById('imageInput');
            const resultBox = document.getElementById('resultBox');
            const resultText = document.getElementById('resultText');
            const btn = document.getElementById('btn');
            const loader = document.getElementById('loader');

            if (fileInput.files.length === 0) {
                alert("Bhai, pehle ek photo toh select karo!");
                return;
            }

            // UI Reset
            btn.disabled = true;
            btn.classList.add('opacity-50');
            loader.classList.remove('hidden');
            resultBox.classList.add('hidden');

            const file = fileInput.files[0];
            const reader = new FileReader();
            
            reader.onload = async () => {
                const base64Data = reader.result.split(',')[1];

                try {
                    const res = await fetch('/api/process', {
                        method: 'POST',
                        body: JSON.stringify({
                            image: base64Data,
                            mimeType: file.type
                        })
                    });

                    const data = await res.json();
                    
                    if (data.candidates && data.candidates[0].content.parts[0].text) {
                        resultText.innerText = data.candidates[0].content.parts[0].text;
                        resultBox.classList.remove('hidden');
                    } else {
                        throw new Error("Invalid Response");
                    }
                } catch (err) {
                    alert("Kuch gadbad ho gayi! Shayad API Key set nahi hai.");
                    console.error(err);
                } finally {
                    btn.disabled = false;
                    btn.classList.remove('opacity-50');
                    loader.classList.add('hidden');
                }
            };

            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
